# SwiftLint Configuration — Strict
# Zero warnings policy

excluded:
  - DerivedData
  - build
  - .build
  - Packages/SwiftMITM/.build
  - Pods
  - .project
  - .claude

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

analyzer_rules:
  - unused_declaration
  - unused_import

disabled_rules:
  - todo

# Force unwrap/cast/try are errors, not warnings
force_cast:
  severity: error

force_try:
  severity: error

force_unwrapping:
  severity: error

# Import hygiene
unused_import: error
implicit_getter: error

# Line and file limits
line_length:
  warning: 120
  error: 150
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 80

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 20

# Naming
type_name:
  min_length: 3
  max_length: 50
  excluded:
    - ID

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - ip
    - x
    - y
    - r
    - g
    - b
    - a
    - i
    - to

nesting:
  type_level: 3
  function_level: 3

# Custom rules
custom_rules:
  no_print_statements:
    name: "No Print Statements"
    regex: '\bprint\s*\('
    message: "Use os.Logger instead of print()."
    severity: warning
    match_kinds:
      - identifier

reporter: xcode
