name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Never cancel an in-flight release (notarize/staple must finish or fail loudly).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  XCODE_VERSION: latest-stable

jobs:
  release:
    name: Build, sign, notarize, publish
    # Owner-only: forks pushing a v* tag run under their own owner and are skipped,
    # so signing secrets are never exposed to fork-controlled code.
    if: github.repository_owner == 'ul0gic'
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      # No dependency cache on the release path: resolve fresh from the pinned
      # Package.resolved so a poisoned cache can never taint a signed build.
      - name: Resolve packages
        run: >-
          xcodebuild -resolvePackageDependencies
          -project api-ghost.xcodeproj -scheme api-ghost
          -clonedSourcePackagesDirPath .spm

      # Ephemeral keychain in RUNNER_TEMP; deleted in the always() cleanup step.
      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # -T grants only codesign/security access to the key (least privilege).
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -f pkcs12 -t cert -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          DEFAULT_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
          # shellcheck disable=SC2086 # intentional split: each keychain path is a separate arg
          security list-keychains -d user -s "$KEYCHAIN_PATH" $DEFAULT_KEYCHAINS

          rm -f "$CERT_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Prepare notarization key
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      # Manual Developer ID signing — direct distribution uses no provisioning profile.
      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project api-ghost.xcodeproj -scheme api-ghost \
            -configuration Release -destination 'generic/platform=macOS' \
            -archivePath "$RUNNER_TEMP/APIGhost.xcarchive" \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      # exportArchive finalizes the Developer ID signature (hardened runtime + timestamp).
      - name: Export Developer ID app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingCertificate</key><string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/APIGhost.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      # Drag-to-Applications layout (app + /Applications symlink), UDZO image.
      - name: Build DMG
        run: |
          set -euo pipefail
          STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$STAGING"
          cp -R "$RUNNER_TEMP/export/APIGhost.app" "$STAGING/APIGhost.app"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "APIGhost" -srcfolder "$STAGING" \
            -ov -format UDZO "APIGhost.dmg"

      - name: Sign DMG
        run: codesign --force --timestamp --sign "Developer ID Application" "APIGhost.dmg"

      - name: Notarize DMG
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "APIGhost.dmg" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 30m

      - name: Staple
        run: xcrun stapler staple "APIGhost.dmg"

      # Hard gates: hardened-runtime + valid signature on the app; notarized,
      # stapled, Gatekeeper-accepted DMG.
      - name: Verify
        run: |
          set -euo pipefail
          APP="$RUNNER_TEMP/export/APIGhost.app"
          codesign --verify --strict --verbose=2 "$APP"
          codesign --display --verbose=4 "$APP" 2>&1 | grep -q '(runtime)' \
            || { echo "::error::Hardened runtime flag missing on the app"; exit 1; }
          xcrun stapler validate "APIGhost.dmg"
          spctl --assess --type open --verbose=4 "APIGhost.dmg"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" "APIGhost.dmg" \
            --title "APIGhost ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/AuthKey.p8" "$RUNNER_TEMP/certificate.p12" \
                "$RUNNER_TEMP/ExportOptions.plist" || true
