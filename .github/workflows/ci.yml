name: CI

on:
  pull_request:
    branches: [v2, main]
  push:
    branches: [v2]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: latest-stable
  SWIFTLINT_VERSION: 0.65.0

jobs:
  lint:
    name: SwiftLint (strict)
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install SwiftLint (pinned)
        run: |
          curl -fsSL -o "$RUNNER_TEMP/swiftlint.zip" \
            "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/portable_swiftlint.zip"
          unzip -o "$RUNNER_TEMP/swiftlint.zip" -d "$RUNNER_TEMP/swiftlint"
          echo "$RUNNER_TEMP/swiftlint" >> "$GITHUB_PATH"

      # Explicit source roots: never descend into the 2 GB SwiftMITM/.build, and lint api-ghostTests.
      - name: Lint
        run: |
          swiftlint version
          swiftlint lint --strict --reporter github-actions-logging \
            api-ghost api-ghostTests \
            Packages/SwiftMITM/Sources Packages/SwiftMITM/Tests Packages/SwiftMITM/Package.swift

  build-test:
    name: Build (Debug) + Test
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve packages
        run: >-
          xcodebuild -resolvePackageDependencies
          -project api-ghost.xcodeproj -scheme api-ghost
          -clonedSourcePackagesDirPath .spm

      # CODE_SIGNING_ALLOWED=NO: no Developer ID on CI (ad-hoc signing still lets
      # arm64 binaries run). Do NOT pass SWIFT_TREAT_WARNINGS_AS_ERRORS globally —
      # it breaks GRDB (BUG-001); both targets enforce it per-target already.
      - name: Build (Debug) + Test
        run: |
          set -o pipefail
          format() { if command -v xcbeautify >/dev/null 2>&1; then xcbeautify --renderer github-actions; else cat; fi; }
          xcodebuild test \
            -project api-ghost.xcodeproj -scheme api-ghost \
            -destination 'platform=macOS' -configuration Debug \
            -clonedSourcePackagesDirPath .spm \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | format

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  build-release:
    name: Build (Release)
    needs: build-test
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Whole-module Release build catches config-only breakage; unsigned here.
      - name: Build (Release)
        run: |
          set -o pipefail
          format() { if command -v xcbeautify >/dev/null 2>&1; then xcbeautify --renderer github-actions; else cat; fi; }
          xcodebuild build \
            -project api-ghost.xcodeproj -scheme api-ghost \
            -destination 'platform=macOS' -configuration Release \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | format
