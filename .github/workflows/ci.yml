name: CI

on:
  pull_request:
    branches: [v2, main]
  push:
    branches: [v2]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: latest-stable

jobs:
  lint:
    name: SwiftLint (strict)
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Ensure SwiftLint
        run: swiftlint version || brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-test:
    name: Build (Debug) + Test
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve packages
        run: >-
          xcodebuild -resolvePackageDependencies
          -project api-ghost.xcodeproj -scheme api-ghost
          -clonedSourcePackagesDirPath .spm

      # CODE_SIGNING_ALLOWED=NO: no Developer ID on CI (ad-hoc signing still lets
      # arm64 binaries run). Do NOT pass SWIFT_TREAT_WARNINGS_AS_ERRORS globally —
      # it breaks GRDB (BUG-001); both targets enforce it per-target already.
      - name: Build (Debug) + Test
        run: |
          set -o pipefail
          format() { if command -v xcbeautify >/dev/null 2>&1; then xcbeautify --renderer github-actions; else cat; fi; }
          xcodebuild test \
            -project api-ghost.xcodeproj -scheme api-ghost \
            -destination 'platform=macOS' -configuration Debug \
            -clonedSourcePackagesDirPath .spm \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | format

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  build-release:
    name: Build (Release)
    needs: build-test
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: .spm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Whole-module Release build catches config-only breakage; unsigned here.
      - name: Build (Release)
        run: |
          set -o pipefail
          format() { if command -v xcbeautify >/dev/null 2>&1; then xcbeautify --renderer github-actions; else cat; fi; }
          xcodebuild build \
            -project api-ghost.xcodeproj -scheme api-ghost \
            -destination 'platform=macOS' -configuration Release \
            -clonedSourcePackagesDirPath .spm \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | format
