name: SAST

# Static security scanning. Runs on Linux — semgrep/ast-grep are language-aware
# text scanners and need no macOS toolchain.
on:
  pull_request:
    branches: [v2, main]
  push:
    branches: [v2]
  schedule:
    - cron: '0 7 * * 1' # weekly sweep against unchanged code

permissions:
  contents: read

concurrency:
  group: sast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install semgrep
        run: pipx install semgrep

      - name: Scan
        run: >-
          semgrep scan --error --metrics off
          --config "p/swift" --config "p/owasp-top-ten" --config "p/secrets"
          api-ghost/

  force-try:
    name: ast-grep (no force-try)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # A scanner tracks the latest engine on purpose; unpinned install is intended.
      - name: Install ast-grep
        run: npm install -g @ast-grep/cli # zizmor: ignore[adhoc-packages]

      # ast-grep exits 0 even on matches; fail explicitly when the set is non-empty.
      - name: Scan for force-try
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016 # $EXPR is an ast-grep metavariable, must stay literal
          matches=$(ast-grep run --pattern 'try! $EXPR' --lang swift api-ghost/ || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found force-try (try!) in production code — see .claude/rules/swift.md"
            exit 1
          fi
          echo "No force-try found in api-ghost/."
